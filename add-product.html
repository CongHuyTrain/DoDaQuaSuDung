<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng sản phẩm thanh lý</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
<div class="menu">
    <a href="index.html" class="btn">Trang chủ</a>
    <a href="add-product.html" class="btn">Đăng sản phẩm</a>
    <a href="my-products.html" class="btn">Sản phẩm của tôi</a>
</div>
</nav>
<div class="container">
    <h1>Đăng sản phẩm thanh lý</h1>

    <form id="addProductForm" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">Tên sản phẩm</label>
            <input type="text" id="title" name="title" required maxlength="255">
        </div>

        <div class="form-group">
            <label for="category_id">Danh mục</label>
            <select id="category_id" name="category_id" required>
                <option value="">-- Chọn danh mục --</option>
            </select>
        </div>

        <div class="form-group">
            <label for="price">Giá bán (VNĐ)</label>
            <input type="number" id="price" name="price" min="0" step="1000" required>
        </div>

        <div class="form-group">
            <label for="condition_status">Tình trạng</label>
            <select name="condition_item" required>

<option value="new">Mới</option>

<option value="like_new">
Như mới
</option>

<option value="good" selected>
Tốt
</option>

<option value="fair">
Đã qua sử dụng
</option>

</select>
        </div>

        <div class="form-group">
            <label for="description">Mô tả sản phẩm</label>
            <textarea id="description" name="description" placeholder="Mô tả tình trạng, lý do thanh lý..."></textarea>
        </div>

        <div class="form-group">
            <label for="image">Ảnh sản phẩm</label>
            <input type="file" id="image" name="image" accept="image/png, image/jpeg, image/webp">
            <img id="previewImg" class="preview-img" style="display:none">
        </div>

        <button type="submit" class="btn">Đăng sản phẩm</button>
        <div id="message" class="message"></div>
    </form>
</div>

<script>
const API_BASE = 'http://localhost:8080/';

fetch(`${API_BASE}/categories.php`)
    .then(res => res.json())
    .then(res => {
        if (res.success) {
            const select = document.getElementById('category_id');
            res.data.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id;
                opt.textContent = cat.name;
                select.appendChild(opt);
            });
        }
    });

document.getElementById('image').addEventListener('change', function () {
    const file = this.files[0];
    const preview = document.getElementById('previewImg');
    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
    } else {
        preview.style.display = 'none';
    }
});

document.getElementById('addProductForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const messageBox = document.getElementById('message');
    messageBox.className = 'message';
    messageBox.textContent = '';

    const formData = new FormData(this);

    try {
        const res = await fetch(`${API_BASE}/add.php`, {
            method: 'POST',
            body: formData,
            credentials: 'include'
        });
        const data = await res.json();

        messageBox.classList.add(data.success ? 'success' : 'error');
        messageBox.textContent = data.message;

        if (data.success) {
            this.reset();
            document.getElementById('previewImg').style.display = 'none';
        }
    } catch (err) {
        messageBox.classList.add('error');
        messageBox.textContent = 'Có lỗi xảy ra, vui lòng thử lại.';
    }
}); 
</script><!DOCTYPE html>
